<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positioning</title>
    <style>
        body {
            height: 500vh;
            
        }
        #container {
             /* position: relative;  */
            display: flex;
            top: 20px;
            
        }
        .box1 {
            /* position: sticky; */
            padding: 20px;
            margin: 10px;
            /* position: fixed;  */
            /* top: 20px; */
             top: 20px;
             left: 30px;
            /* position: absolute; */
            width: 100px;
            background-color: lightblue;
           
        }
        .box2 {
            /* position: relative; */
         /* position: fixed; */
            padding: 20px;
            margin: 10px; 
            width: 100px;
             top: 20px;
            /* left: 20px; */ 
            background-color: red;
           
        }
        .box3 {
            position: sticky;
             padding: 20px;
            margin: 10px;
            top: 50px;
            
            background-color: green;
           width: 100px;
        }
        </style>
</head>
<body>
    <div id="container">
    <div class="box1">Box1</div>
   <div class="box2">Box2</div>
   <div class="box3">Box3</div>
</div>
</body>
</html>
