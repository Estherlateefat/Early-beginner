<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Student Information</title>
</head>
<body>
    <header> 
        <div>
         <h1><strong>Name:</strong> Suara Lateefat Esther <br>
            <strong>Department:</strong> Frontend Development</h1>
           
        </div> 
    </header>

    <main> 
       <section style="text-align: justify;"> 
        <h2 style="text-align: center;">Form Student Information</h2>
      
          <form action="/submit" method="get">
          <p>
            <label for="fullName">Full Name:</label>
            <input type="text" name="fullName" id="fullName" required>
          </p>
          
          <p>
            <label for="email">Email Address:</label>
            <input type="email" name="email" id="email" required>
          </p>
          
          <p>
            <label for="password">Password:</label>
            <input type="password" name="password" id="password" required>
          </p>
          
          <p>
            <label for="age">Age:</label>
            <input type="number" name="age" id="age" min="16" max="60" value="16">
          </p>

          <h3>Gender:</h3>
          <p>
            <input type="radio" id="male" name="gender" value="male">
            <label for="male">Male</label>
            
            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
            
            <input type="radio" id="others" name="gender" value="others">
            <label for="others">Prefer not to say</label>
          </p>

          <p>
            <label for="profile">Student Profile (JPG only):</label>
            <input type="file" accept=".jpg, .jpeg" name="profile" id="profile">
          </p>

          <h3>Hobbies:</h3>
          <p> 
            <input type="checkbox" id="music" name="hobbies" value="music">
            <label for="music">Music</label>
            
            <input type="checkbox" id="sports" name="hobbies" value="sports">
            <label for="sports">Sports</label>
            
            <input type="checkbox" id="reading" name="hobbies" value="reading">
            <label for="reading">Reading</label>
            
            <input type="checkbox" id="coding" name="hobbies" value="coding">
            <label for="coding">Coding</label>
          </p>

          <p>
            <label for="country">Select your country</label>
            <select id="country" name="country">
                <option value="" disabled selected>Select an option</option>
                <option value="us">United States</option>
                <option value="uk">United Kingdom</option>
                <option value="ng">Nigeria</option>
                <option value="ca">Canada</option>
            </select>
          </p>
          <p>
            <label for="bio">Tell us about yourself</label><br><br>
            <textarea id="bio" name="bio" rows="5" cols="40" placeholder="Enter your biography here..." maxlength="500"></textarea>
          </p>
          
          <div>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
          </div>
        </form>
      </section>
    </main>
     <footer>
        <p style="text-align: center;">&lt; &lt; &lt; &copy; Esther 2026 &gt; &gt; &gt;</p>
    </footer>
</body>
</html>
